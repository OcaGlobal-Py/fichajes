const pad2 = (n) => String(n).padStart(2, "0");
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
};
const nowHM = (d = new Date()) => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
const nowHMS = (d = new Date()) => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
const fmtDate = (s) => {
  if (!s) return "—";
  const [y, m, d] = String(s).split("-");
  return d && m && y ? `${d}/${m}/${y}` : s;
};
const fmtTime = (v) => {
  if (!v) return "—";
  if (typeof v === "string" && /^\d{2}:\d{2}/.test(v)) return v.slice(0, 5);
  return String(v);
};
const daysAgo = (n) => {
  const d = new Date();d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
};
const durationHM = (inT, outT) => {
  if (!inT || !outT) return "—";
  const toMin = (s) => {const [h, m] = s.split(":").map(Number);return h * 60 + m;};
  const d = toMin(outT) - toMin(inT);
  if (d < 0) return "—";
  return `${pad2(Math.floor(d / 60))}h ${pad2(d % 60)}m`;
};
const toSec = (v) => (v || "").split(":").reduce((a, x, i) => a + Number(x) * [3600, 60, 1][i], 0);

/** Calcula minutos trabajados a partir de una lista de fichajes del día
 *  (ordenados por hora). `hypoOut` simula un cierre extra si queda abierta. */
const minutosTrabajados = (fichs, hypoOut) => {
  const toMin = (v) => { const s = String(v || "").slice(0,5); const [h,m] = s.split(":").map(Number); return (h||0)*60 + (m||0); };
  const list = fichs.slice().sort((a,b) => String(a.horaDeclarada).localeCompare(String(b.horaDeclarada)));
  let total = 0, openIn = null;
  for (const f of list) {
    if (f.tipo === "entrada") openIn = toMin(f.horaDeclarada);
    else if (f.tipo === "salida" && openIn != null) {
      total += Math.max(0, toMin(f.horaDeclarada) - openIn);
      openIn = null;
    }
  }
  if (openIn != null && hypoOut != null) total += Math.max(0, toMin(hypoOut) - openIn);
  return total;
};

/* ═══════════════════════════════════════════════════════════════
   API — Apps Script backend
═══════════════════════════════════════════════════════════════ */
const callApi = async (action, data = {}) => {
  const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, ...data }) });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
};

const api = {
  loginEmployee: (dni) => callApi("loginEmployee", { dni: String(dni).toUpperCase() }),
  loginRole: (role, pass) => callApi("loginRole", { role, pass }),

  fichar: (data) => callApi("fichar", data),
  updateFichaje: (dni, id, horaDeclarada) => callApi("updateFichaje", { dni, id, horaDeclarada }),
  getEmployees: (role, pass) => callApi("getEmployees", { role: role || "admin", pass }),
  getFichajes: (role, pass, opts) => callApi("getFichajes", { role, pass, ...(opts || {}) }),
  getCorrecciones: (role, pass) => callApi("getCorrecciones", { role, pass }),
  requestCorreccion: (data) => callApi("requestCorreccion", data),

const NascorLogo = ({ size = 32 }) =>
<img src={NASCOR_LOGO_DATA} alt="Nascor"
style={{ display: "block", height: size, objectFit: "contain", background: "transparent", width: "156px" }} />;


const GradoLogo = ({ size = 32 }) =>
<img src={GRADO_LOGO_DATA} alt="Grado Informática"
style={{ display: "block", height: size, width: "auto", objectFit: "contain", background: "transparent" }} />;


const TenantLogo = ({ tenant, size = 32 }) =>
tenant?.id === "grado" ? <GradoLogo size={size} /> : <NascorLogo size={size} />;

// alias para compatibilidad
const OcaLogo = NascorLogo;

/* Iconos SVG — trazos Nascor (stroke-linecap round, uniforme) */
const Icon = ({ name, size = 16, color = "currentColor", strokeWidth = 1.8 }) => {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
    stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "clock":return <svg {...p}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></svg>;
    case "pin":return <svg {...p}><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z" /><circle cx="12" cy="9" r="2.5" /></svg>;
    case "check":return <svg {...p}><path d="M4 12l5 5L20 6" /></svg>;
    case "in":return <svg {...p}><path d="M10 17l5-5-5-5" /><path d="M15 12H3" /><path d="M21 5v14" /></svg>;
    case "out":return <svg {...p}><path d="M14 17l5-5-5-5" /><path d="M19 12H7" /><path d="M3 5v14" /></svg>;
    case "calendar":return <svg {...p}><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 9h18M8 3v4M16 3v4" /></svg>;
    case "trend":return <svg {...p}><path d="M3 17l6-6 4 4 8-8" /><path d="M14 7h7v7" /></svg>;
    case "users":return <svg {...p}><circle cx="9" cy="8" r="3.5" /><path d="M2 20c.5-3.5 3.5-6 7-6s6.5 2.5 7 6" /><circle cx="17" cy="7" r="2.5" /><path d="M17 13c2.5 0 4.5 1.5 5 4" /></svg>;
    case "shield":return <svg {...p}><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z" /><path d="M9 12l2 2 4-4" /></svg>;
    case "sun":return <svg {...p}><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.5 1.5M17.6 17.6l1.5 1.5M2 12h2M20 12h2M4.9 19.1l1.5-1.5M17.6 6.4l1.5-1.5" /></svg>;
    case "moon":return <svg {...p}><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" /></svg>;
    case "logout":return <svg {...p}><path d="M15 17l5-5-5-5" /><path d="M20 12H9" /><path d="M9 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h4" /></svg>;
    case "history":return <svg {...p}><path d="M3 12a9 9 0 1 0 3-6.7" /><path d="M3 4v5h5" /><path d="M12 8v5l3 2" /></svg>;
    case "edit":return <svg {...p}><path d="M4 20h4l10-10-4-4L4 16v4z" /><path d="M14 6l4 4" /></svg>;
    case "eye":return <svg {...p}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" /><circle cx="12" cy="12" r="3" /></svg>;
    case "eye-off":return <svg {...p}><path d="M3 3l18 18" /><path d="M10.6 6.1A10.5 10.5 0 0 1 12 6c6.5 0 10 7 10 7a17 17 0 0 1-3.3 4.1" /><path d="M6.5 6.6C3.7 8.4 2 12 2 12s3.5 7 10 7c1.5 0 2.9-.3 4.1-.8" /><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2" /></svg>;
    case "sparkle":return <svg {...p}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6" /></svg>;
    case "bolt":return <svg {...p}><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" /></svg>;
    default:return null;
  }
};

const Toast = ({ toast }) => {
  if (!toast) return null;
  const colors = {
    success: { bg: "#1F7A4D", fg: "#FFFFFF" },
    error: { bg: "#C23B2A", fg: "#FFFFFF" },
    info: { bg: "#1A1A1D", fg: "#FFFFFF" }
  }[toast.type || "info"];
  return (

const useClock = () => {
  const [now, setNow] = useState(new Date());
  useEffect(() => {const id = setInterval(() => setNow(new Date()), 1000);return () => clearInterval(id);}, []);
  return now;
};

const useGeo = (enabled) => {
  const [geo, setGeo] = useState({ status: "idle", lat: null, lng: null, err: null });
  useEffect(() => {
    if (!enabled) return;
    if (!navigator.geolocation) {setGeo({ status: "error", err: "no-support" });return;}
    setGeo((g) => ({ ...g, status: "loading" }));
    navigator.geolocation.getCurrentPosition(
      (p) => setGeo({ status: "ok", lat: p.coords.latitude, lng: p.coords.longitude, err: null }),
      (e) => setGeo({ status: "error", err: e.message, lat: null, lng: null }),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }, [enabled]);
  return geo;
};

const useAutoLogout = (active, onLogout, onWarn) => {
  const timerRef = useRef(null);
  const warnRef = useRef(null);
  useEffect(() => {
    if (!active) return;
    const reset = () => {
      clearTimeout(timerRef.current);clearTimeout(warnRef.current);
      warnRef.current = setTimeout(() => onWarn?.(), LOGOUT_MS - WARN_MS);
      timerRef.current = setTimeout(() => onLogout?.(), LOGOUT_MS);
    };
    const evts = ["mousemove", "keydown", "click", "scroll", "touchstart"];
    evts.forEach((e) => window.addEventListener(e, reset, { passive: true }));
    reset();
    return () => {
      clearTimeout(timerRef.current);clearTimeout(warnRef.current);
      evts.forEach((e) => window.removeEventListener(e, reset));
    };
  }, [active, onLogout, onWarn]);
};

const exportXLSX = (rows, filename) => {
  if (!window.XLSX) return;
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();

const exportPDF = (title, columns, rows, filename) => {
  if (!window.jspdf) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape" });
  doc.setFontSize(14);doc.text(title, 14, 16);
  doc.setFontSize(9);doc.text(`Generado: ${new Date().toLocaleString("es-ES")}`, 14, 22);
  doc.autoTable({
    head: [columns.map((c) => c.header)],
    body: rows.map((r) => columns.map((c) => r[c.key] ?? "")),
    startY: 28, styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [242, 106, 33], textColor: 255, fontStyle: "bold" },
    alternateRowStyles: { fillColor: [249, 247, 242] }
  });
  doc.save(filename);
};

const EmployeeScreen = ({ pal, employee, onLogout, tweaks, setTweaks, showToast }) => {
  const now = useClock();

  const [loading, setLoading] = useState(true);

  const [showHistory, setShowHistory] = useState(false);
  const [warnIdle, setWarnIdle] = useState(false);
  const geo = useGeo(true);

  const loadToday = async () => {
    setLoading(true);
    try {
      const r = await api.getMyFichajes(employee.dni, todayStr());
      if (r.success) setTodayList(r.fichajes);
    } catch (e) {showToast("error", "Error cargando fichajes");}
    setLoading(false);
  };
  useEffect(() => {loadToday();}, []);

  useAutoLogout(true, onLogout, () => setWarnIdle(true));

  const lastType = todayList.length ? todayList[todayList.length - 1].tipo : null;
  const nextAction = lastType === "entrada" ? "salida" : "entrada";
  const isOpen = lastType === "entrada";

  const totalWorked = useMemo(() => {
    let sec = 0;
    for (let i = 0; i < todayList.length; i += 2) {
      const inF = todayList[i],outF = todayList[i + 1];
      if (inF && outF && inF.tipo === "entrada" && outF.tipo === "salida") {
        sec += toSec(outF.horaDeclarada) - toSec(inF.horaDeclarada);
      }
    }
    if (isOpen) {
      const inF = todayList[todayList.length - 1];
      const nowSec = toSec(nowHMS(now));
      sec += nowSec - toSec(inF.horaDeclarada);
    }
    if (sec < 0) sec = 0;
    const h = Math.floor(sec / 3600),m = Math.floor(sec % 3600 / 60),s = sec % 60;
    return { h, m, s, str: `${pad2(h)}:${pad2(m)}:${pad2(s)}` };
  }, [todayList, now, isOpen]);

  const pairs = useMemo(() => {
    const out = [];let cur = null;
    for (const f of todayList) {
      if (f.tipo === "entrada") {cur = { entrada: f, salida: null };out.push(cur);} else
      if (cur) {cur.salida = f;cur = null;}
    }
    return out;
  }, [todayList]);

  // Refresco silencioso (sin mostrar "cargando") — usado tras fichar/editar.
  const reloadSilent = async () => {
    try {
      const r = await api.getMyFichajes(employee.dni, todayStr());
      if (r.success) setTodayList(r.fichajes);

  };

  const doFichar = async () => {
    if (ficking) return;
    // Validación 10h/día
    const hypoOut = nextAction === "salida" ? nowHMS(now) : null;
    const simulados = [...todayList, { tipo: nextAction, horaDeclarada: nowHMS(now) }];
    const mins = minutosTrabajados(simulados, null);
    if (mins > LIMITE_DIARIO_MIN) {
      showToast("error", "No se pueden superar las 10 horas trabajadas al día.");
      return;
    }
    setFicking(true);
    const data = {
      sociedad: employee.sociedad, nombre: employee.nombre, dni: employee.dni,
      tipo: nextAction, fecha: todayStr(),
      horaDeclarada: nowHMS(now), horaReal: nowHMS(new Date()),
      timestamp: new Date().toISOString(),
      lat: geo.lat, lng: geo.lng
    };
    // Optimistic UI: insertamos el fichaje inmediatamente y mostramos toast.

    showToast("success", `✓ ${nextAction === "entrada" ? "Entrada" : "Salida"} registrada`);
    setFicking(false);
    // Confirmación en segundo plano — sustituye el optimista por el real
    try {
      const r = await api.fichar(data);

/* Edit fichaje modal — empleado edita directamente hora declarada de hoy */
const EditFichajeModal = ({ pal, fichaje, employee, todayList, onClose, onSuccess, onError }) => {
  const [hora, setHora] = useState(fmtTime(fichaje.horaDeclarada));
  const [loading, setLoading] = useState(false);
  const [localErr, setLocalErr] = useState("");

  const submit = async () => {
    setLocalErr("");
    if (!hora || !/^\d{2}:\d{2}$/.test(hora)) {
      setLocalErr("Hora inválida");
      return;
    }
    // Validación 10h en cliente antes de enviar
    const simulados = todayList.map(f =>
      f.id === fichaje.id ? { ...f, horaDeclarada: hora + ":00" } : f
    );
    const mins = minutosTrabajados(simulados, null);
    if (mins > LIMITE_DIARIO_MIN) {
      setLocalErr("Con esa hora se superarían las 10h trabajadas hoy.");
      return;
    }
    setLoading(true);
    try {
      const r = await api.updateFichaje(employee.dni, fichaje.id, hora + ":00");
      if (r.success) {
        onSuccess(`Hora actualizada a ${hora}`);
      } else {
        setLocalErr(r.error || "No se pudo actualizar");
      }
    } catch (e) {
      setLocalErr(String(e?.message || e));
    }
    setLoading(false);
  };

  const tipoLabel = fichaje.tipo === "entrada" ? "entrada" : "salida";
  const tipoColor = fichaje.tipo === "entrada" ? pal.success : pal.danger;

  return (
    <Modal open={true} onClose={onClose} pal={pal}>
      <div style={{
        display: "inline-flex", alignItems: "center", gap: 8,
        padding: "4px 10px", borderRadius: 999,
        background: fichaje.tipo === "entrada" ? pal.successBg : pal.dangerBg,
        color: tipoColor, fontSize: 11, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase",
        marginBottom: 10
      }}>
        {fichaje.tipo === "entrada" ? "↓ Entrada" : "↑ Salida"}
      </div>
      <h3 style={{ margin: "0 0 6px", fontSize: 20 }}>Editar hora de {tipoLabel}</h3>
      <p style={{ margin: "0 0 14px", fontSize: 13, color: pal.inkSoft }}>
        Registrada a las <strong className="mono" style={{ color: pal.ink }}>{fmtTime(fichaje.horaDeclarada)}</strong>.
        Ajusta la hora si olvidaste fichar o te equivocaste.
      </p>
      <div style={{ marginBottom: 16, padding: "8px 12px", borderRadius: 8, background: pal.successBg, color: pal.success, fontSize: 12, fontWeight: 600 }}>
        ✓ Edición directa — se aplica de inmediato sin aprobación (solo hoy).
      </div>
      <label style={{ fontSize: 12, fontWeight: 600, color: pal.inkSoft }}>Nueva hora</label>
      <Input pal={pal} type="time" value={hora} onChange={(e) => setHora(e.target.value)}
        style={{ marginTop: 6, marginBottom: 12, fontSize: 22, fontWeight: 700, textAlign: "center", fontFamily: "'JetBrains Mono', monospace" }} />

      {localErr &&
        <div style={{
          padding: "10px 14px", background: pal.dangerBg,
          color: pal.danger, borderRadius: 8, fontSize: 13, fontWeight: 500, marginBottom: 12
        }}>{localErr}</div>
      }

      <div style={{
        fontSize: 11, color: pal.inkMute, background: pal.surfaceAlt,
        padding: "10px 12px", borderRadius: 8, marginBottom: 16, lineHeight: 1.5
      }}>
        La hora real del sistema queda registrada para auditoría (RD-L 8/2019). Solo puedes editar fichajes de hoy.
      </div>

      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
        <Btn pal={pal} variant="secondary" onClick={onClose}>Cancelar</Btn>
        <Btn pal={pal} onClick={submit} disabled={loading}>
          {loading ? "Guardando…" : "Guardar cambio"}
        </Btn>
      </div>
    </Modal>);
};

/* Correction request modal — used for past days (historial) */
const CorrectionModal = ({ pal, fichaje, employee, onClose, onSuccess }) => {
  const [hora, setHora] = useState(fmtTime(fichaje.horaDeclarada));
  const [motivo, setMotivo] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const submit = async () => {
    if (!motivo.trim()) return;
    setLoading(true);
    try {
      const r = await api.requestCorreccion({
        empId: employee.id, nombre: employee.nombre, fecha: fichaje.fecha,
        tipo: fichaje.tipo, horaOriginal: fmtTime(fichaje.horaDeclarada),
        horaPropuesta: hora, motivo: motivo.trim()
      });
      if (r && r.success) {
        onSuccess();
      } else {
        setError((r && r.error) || "Error al enviar la solicitud");
      }
    } catch (e) {
      setError(String(e?.message || e));
    }
    setLoading(false);
  };
  return (
    <Modal open={true} onClose={onClose} pal={pal}>
      <h3 style={{ margin: "0 0 6px", fontSize: 20 }}>Solicitar corrección</h3>
      <p style={{ margin: "0 0 14px", fontSize: 13, color: pal.inkSoft }}>
        {fmtDate(fichaje.fecha)} · <strong style={{ textTransform: "capitalize", color: pal.ink }}>{fichaje.tipo}</strong> registrada a las {fmtTime(fichaje.horaDeclarada)}
      </p>
      <div style={{ marginBottom: 16, padding: "8px 12px", borderRadius: 8, background: pal.accentSoft, color: pal.accent, fontSize: 12, fontWeight: 600 }}>
        ℹ Requiere aprobación de RRHH — quedará pendiente en el panel de administración.
      </div>
      <label style={{ fontSize: 12, fontWeight: 600, color: pal.inkSoft }}>Hora correcta</label>
      <Input pal={pal} type="time" value={hora} onChange={(e) => setHora(e.target.value)} style={{ marginTop: 6, marginBottom: 14 }} />
      <label style={{ fontSize: 12, fontWeight: 600, color: pal.inkSoft }}>Motivo (obligatorio)</label>
      <textarea value={motivo} onChange={(e) => setMotivo(e.target.value)} rows={4} placeholder="Ej: Olvidé fichar al entrar, llegué pronto por reunión con cliente…"
      style={{
        width: "100%", padding: 12, borderRadius: 10, border: `1px solid ${pal.line}`,
        background: pal.surface, color: pal.ink, fontSize: 14, marginTop: 6, resize: "vertical",
        fontFamily: "inherit", outline: "none"
      }} />
      {error && <div style={{ marginTop: 10, padding: 10, borderRadius: 8, background: pal.dangerBg, color: pal.danger, fontSize: 13 }}>{error}</div>}
      <div style={{ display: "flex", gap: 8, marginTop: 20, justifyContent: "flex-end" }}>
        <Btn pal={pal} variant="secondary" onClick={onClose}>Cancelar</Btn>
        <Btn pal={pal} onClick={submit} disabled={loading || !motivo.trim()}>
          {loading ? "Enviando…" : "Solicitar aprobación"}
        </Btn>
      </div>
    </Modal>);

};

/* History modal */
const HistoryModal = ({ pal, employee, onClose, showToast }) => {
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [corrFichaje, setCorrFichaje] = useState(null);
  const reload = async () => {
    const rr = await callApi("getMyFichajesRange", { dni: employee.dni, desde: daysAgo(30), hasta: todayStr() }).catch(() => ({ success: false, fichajes: [] }));
    const r = rr.success ? rr : { success: true, fichajes: [] };
    if (r.success) {
      const mine = r.fichajes.filter((f) => f.dni === employee.dni);
      setList(mine.sort((a, b) => (b.fecha + b.horaDeclarada).localeCompare(a.fecha + a.horaDeclarada)));
    }
    setLoading(false);
  };
  useEffect(() => { reload(); }, []);
  const byDay = useMemo(() => {
    const map = new Map();
    for (const f of list) {
      if (!map.has(f.fecha)) map.set(f.fecha, []);
      map.get(f.fecha).push(f);
    }
    return Array.from(map.entries());
  }, [list]);
  return (
    <Modal open={true} onClose={onClose} pal={pal} maxWidth={560}>
      <h3 style={{ margin: "0 0 16px", fontSize: 20 }}>Mi historial (30 días)</h3>
      {loading ? <div style={{ padding: 20, textAlign: "center", color: pal.inkMute }}>Cargando…</div> :
      byDay.length === 0 ? <div style={{ padding: 20, textAlign: "center", color: pal.inkMute }}>Sin registros</div> :
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {byDay.map(([date, fichs]) => {
          const pairs = [];
          for (let i = 0; i < fichs.length; i += 2) pairs.push([fichs[i], fichs[i + 1]]);
          return (
            <div key={date} style={{ padding: 14, background: pal.surfaceAlt, borderRadius: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <strong>{fmtDate(date)}</strong>
                  <span style={{ fontSize: 12, color: pal.inkSoft }}>{fichs.length} fichaje{fichs.length > 1 ? "s" : ""}</span>
                </div>
                {pairs.map((p, i) => {
                  const isToday = date === todayStr();
                  return (
                    <div key={i} className="mono" style={{ fontSize: 13, color: pal.inkSoft, display: "flex", gap: 12, alignItems: "center", padding: "4px 0" }}>
                      <span>↓ {fmtTime(p[0]?.horaDeclarada)}</span>
                      <span>↑ {p[1] ? fmtTime(p[1].horaDeclarada) : "—"}</span>
                      <span style={{ marginLeft: "auto", color: pal.ink, fontWeight: 600 }}>
                        {durationHM(fmtTime(p[0]?.horaDeclarada), fmtTime(p[1]?.horaDeclarada))}
                      </span>
                      {!isToday && (
                        <div style={{ display: "flex", gap: 4 }}>
                          {p[0] && <button onClick={() => setCorrFichaje(p[0])} title="Solicitar corrección de entrada"
                            style={{ border: `1px solid ${pal.line}`, background: pal.surface, color: pal.inkSoft, cursor: "pointer", width: 26, height: 26, borderRadius: 6, fontFamily: "inherit", fontSize: 12 }}>✎</button>}
                          {p[1] && <button onClick={() => setCorrFichaje(p[1])} title="Solicitar corrección de salida"
                            style={{ border: `1px solid ${pal.line}`, background: pal.surface, color: pal.inkSoft, cursor: "pointer", width: 26, height: 26, borderRadius: 6, fontFamily: "inherit", fontSize: 12 }}>✎</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>);

        })}
        </div>
      }
      {corrFichaje && <CorrectionModal pal={pal} fichaje={corrFichaje} employee={employee}
        onClose={() => setCorrFichaje(null)}
        onSuccess={() => { setCorrFichaje(null); if (showToast) showToast("success", "Solicitud enviada a RRHH"); reload(); }} />}
    </Modal>);

};

const AdminAuditorScreen = ({ pal, role, pass, onLogout, tweaks, setTweaks, showToast }) => {
  const [tab, setTab] = useState("overview");
  const [fichajes, setFichajes] = useState([]);
  const [employees, setEmployees] = useState([]);
  const [correcciones, setCorrecciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dateFrom, setDateFrom] = useState(daysAgo(14));
  const [dateTo, setDateTo] = useState(todayStr());
  const [warnIdle, setWarnIdle] = useState(false);
  const isAdmin = role === "admin";

  const reload = async () => {
    setLoading(true);
    try {
      const calls = [
        api.getFichajes(role, pass, { desde: dateFrom, hasta: dateTo })
      ];
      if (isAdmin) {
        calls.push(api.getEmployees(role, pass));
        calls.push(api.getCorrecciones(role, pass));
      }
      const results = await Promise.all(calls);
      if (results[0]?.success) setFichajes(results[0].fichajes);
      if (isAdmin) {
        if (results[1]?.success) setEmployees(results[1].employees);
        if (results[2]?.success) setCorrecciones(results[2].correcciones);
      }
    } catch (err) {showToast("error", String(err?.message || err));}
    setLoading(false);
  };
  useEffect(() => {reload();}, [dateFrom, dateTo]);
  useAutoLogout(true, onLogout, () => setWarnIdle(true));

  const pendingCount = correcciones.filter((c) => c.estado === "pendiente").length;

  const tabs = isAdmin ? [
  { id: "overview", label: "Resumen" },
  { id: "fichajes", label: "Fichajes", count: fichajes.length },
  { id: "corrections", label: "Correcciones", count: pendingCount },
  { id: "employees", label: "Empleados", count: employees.length }] :
  [
  { id: "fichajes", label: "Fichajes", count: fichajes.length }
  ];

  // Fuerza que el auditor aterrice siempre en la pestaña permitida
  useEffect(() => {
    if (!isAdmin && tab !== "fichajes") setTab("fichajes");
  }, [isAdmin, tab]);

  const approveCorrection = async (c, ok) => {
    if (!isAdmin) return;
    const r = await api.resolveCorreccion(pass, c.id, ok);
    if (r.success) {
      if (ok && r.warn) {
        showToast("error", r.warn);
      } else {
        showToast("success", ok ? "Corrección aprobada — fichaje actualizado" : "Rechazada");
      }
      reload();
    } else {
      showToast("error", r.error || "Error");
    }
  };

  return (
    <div style={{ minHeight: "100vh", background: pal.bg, color: pal.ink, fontFamily: "Inter, sans-serif" }}>
      <DashHeader pal={pal} role={role} onLogout={onLogout} tweaks={tweaks} setTweaks={setTweaks} />

      {!isAdmin &&
      <div style={{ background: pal.warnBg, color: pal.warn, padding: "8px 24px", fontSize: 12, fontWeight: 600, textAlign: "center", borderBottom: `1px solid ${pal.warn}` }}>
          🔍 Acceso de auditor — solo lectura. Sin capacidad de modificación.
        </div>
      }

      <main style={{ maxWidth: 1280, margin: "0 auto", padding: "24px" }}>
        <Tabs pal={pal} tabs={tabs} active={tab} onChange={setTab} />
        {tab === "overview" && <OverviewTab pal={pal} fichajes={fichajes} employees={employees} correcciones={correcciones} dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo} loading={loading} />}
        {tab === "fichajes" && <FichajesTab pal={pal} fichajes={fichajes} dateFrom={dateFrom} dateTo={dateTo} setDateFrom={setDateFrom} setDateTo={setDateTo} role={role} pass={pass} reload={reload} showToast={showToast} employees={employees} />}
        {tab === "corrections" && <CorrectionsTab pal={pal} correcciones={correcciones} isAdmin={isAdmin} onResolve={approveCorrection} />}
        {tab === "employees" && <EmployeesTab pal={pal} employees={employees} isAdmin={isAdmin} pass={pass} reload={reload} showToast={showToast} fichajes={fichajes} />}
      </main>

      <Modal open={warnIdle} onClose={() => setWarnIdle(false)} pal={pal}>
        <h3 style={{ margin: 0 }}>¿Sigues ahí?</h3>
        <p style={{ color: pal.inkSoft }}>Por seguridad, cerraremos tu sesión en 30 segundos.</p>
        <Btn pal={pal} onClick={() => setWarnIdle(false)} style={{ width: "100%", justifyContent: "center" }}>Continuar</Btn>
      </Modal>
    </div>);

};

/* ════ Overview tab ════ */
const OverviewTab = ({ pal, fichajes, employees, correcciones, dateFrom, dateTo, setDateFrom, setDateTo }) => {
  const today = todayStr();
  const todayF = fichajes.filter((f) => f.fecha === today);
  const workingNow = useMemo(() => {
    const byEmp = new Map();
    for (const f of todayF) {
      const arr = byEmp.get(f.dni) || [];arr.push(f);byEmp.set(f.dni, arr);
    }
    let count = 0;
    for (const [, arr] of byEmp) {
      arr.sort((a, b) => a.horaDeclarada.localeCompare(b.horaDeclarada));
      if (arr[arr.length - 1]?.tipo === "entrada") count++;
    }
    return count;
  }, [todayF]);

  const pendingCorr = correcciones.filter((c) => c.estado === "pendiente").length;
  const activeEmp = employees.filter((e) => e.activo === "Sí").length;

  const discrepancies = useMemo(() => {
    let count = 0;
    for (const f of fichajes) {
      if (!f.horaDeclarada || !f.horaReal) continue;
      const diff = Math.abs(toSec(f.horaDeclarada) - toSec(f.horaReal));
      if (diff > 120) count++;
    }
    return count;
  }, [fichajes]);

  // Per-day histogram
  const byDay = useMemo(() => {
    const m = new Map();
    for (const f of fichajes) {
      const k = f.fecha;m.set(k, (m.get(k) || 0) + 1);
    }
    return Array.from(m.entries()).sort((a, b) => a[0].localeCompare(b[0]));
  }, [fichajes]);
  const maxDay = Math.max(1, ...byDay.map((d) => d[1]));

  // Top absentees (active employees with no fichaje today)
  const absentToday = employees.filter((e) => e.activo === "Sí" && !todayF.some((f) => f.dni === e.dni));

  return (
    <div>
      {/* Date filters */}
      <div style={{ display: "flex", gap: 12, alignItems: "end", marginBottom: 20, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 11, color: pal.inkMute, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Desde</div>
          <Input pal={pal} type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} style={{ width: 160 }} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: pal.inkMute, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Hasta</div>
          <Input pal={pal} type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} style={{ width: 160 }} />
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <Btn pal={pal} variant="secondary" size="sm" onClick={() => {setDateFrom(daysAgo(7));setDateTo(todayStr());}}>7d</Btn>
          <Btn pal={pal} variant="secondary" size="sm" onClick={() => {setDateFrom(daysAgo(14));setDateTo(todayStr());}}>14d</Btn>
          <Btn pal={pal} variant="secondary" size="sm" onClick={() => {setDateFrom(daysAgo(30));setDateTo(todayStr());}}>30d</Btn>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14, marginBottom: 24 }}>
        <StatCard pal={pal} label="En jornada ahora" value={workingNow} tone={pal.success} sub={`de ${activeEmp} activos`} icon="bolt" />
        <StatCard pal={pal} label="Fichajes hoy" value={todayF.length} sub={`${new Set(todayF.map((f) => f.dni)).size} empleados`} icon="check" />
        <StatCard pal={pal} label="Correcciones pendientes" value={pendingCorr} tone={pendingCorr > 0 ? pal.warn : pal.ink} icon="edit" sub={pendingCorr > 0 ? "requieren revisión" : "todo al día"} />
        <StatCard pal={pal} label="Discrepancias > 2min" value={discrepancies} tone={discrepancies > 0 ? pal.danger : pal.ink} sub="hora real vs declarada" icon="clock" />
      </div>

      {/* Activity chart */}
      <Card pal={pal} pad={20} style={{ marginBottom: 20 }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 14, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>Actividad por día</h3>
        <div style={{ display: "flex", alignItems: "end", gap: 4, height: 140 }}>
          {byDay.map(([d, n]) =>
          <div key={d} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, minWidth: 24 }}>
              <div className="mono" style={{ fontSize: 10, color: pal.inkMute }}>{n}</div>
              <div style={{
              width: "100%", height: `${n / maxDay * 100}%`,
              background: d === today ? pal.accent : pal.accentBorder,
              borderRadius: "4px 4px 0 0", minHeight: 2, transition: "height 300ms"
            }} />
              <div style={{ fontSize: 9, color: pal.inkMute, transform: "rotate(-45deg)", transformOrigin: "center", marginTop: 8, whiteSpace: "nowrap" }}>
                {d.slice(5)}
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* Absent today */}
      {absentToday.length > 0 &&
      <Card pal={pal}>
          <h3 style={{ margin: "0 0 14px", fontSize: 14, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>
            Sin fichar hoy ({absentToday.length})
          </h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {absentToday.slice(0, 20).map((e) =>
          <Chip key={e.id} pal={pal} tone="warn">{e.nombre}</Chip>
          )}
            {absentToday.length > 20 && <Chip pal={pal}>+{absentToday.length - 20} más</Chip>}
          </div>
        </Card>
      }
    </div>);

};

/* ════ Fichajes tab ════ */
const FichajesTab = ({ pal, fichajes, dateFrom, dateTo, setDateFrom, setDateTo, role, pass, reload, showToast, employees }) => {
  const [search, setSearch] = useState("");
  const [filterSoc, setFilterSoc] = useState("all");
  const [filterTipo, setFilterTipo] = useState("all");
  const isAdmin = role === "admin";

  const sociedades = useMemo(() => Array.from(new Set(fichajes.map((f) => f.sociedad))).sort(), [fichajes]);

  const rows = useMemo(() => {
    return fichajes.filter((f) => {
      if (search && !f.nombre.toLowerCase().includes(search.toLowerCase()) && !f.dni.includes(search.toUpperCase())) return false;
      if (filterSoc !== "all" && f.sociedad !== filterSoc) return false;
      if (filterTipo !== "all" && f.tipo !== filterTipo) return false;
      return true;
    }).sort((a, b) => (b.fecha + b.horaDeclarada).localeCompare(a.fecha + a.horaDeclarada));
  }, [fichajes, search, filterSoc, filterTipo]);

  const exportRows = rows.map((f) => ({
    Fecha: f.fecha, Hora: fmtTime(f.horaDeclarada), HoraReal: fmtTime(f.horaReal),
    Tipo: f.tipo, Nombre: f.nombre, DNI: f.dni, Sociedad: f.sociedad,
    Lat: f.lat || "", Lng: f.lng || ""
  }));

  const del = async (id) => {
    if (!confirm("¿Eliminar este fichaje?")) return;
    const r = await api.deleteFichaje(pass, id);
    if (r.success) {showToast("success", "Eliminado");reload();}
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <Input pal={pal} value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar nombre o DNI…" style={{ flex: "1 1 200px", maxWidth: 320 }} />
        <select value={filterSoc} onChange={(e) => setFilterSoc(e.target.value)} style={{
          padding: "12px 14px", borderRadius: 10, border: `1px solid ${pal.line}`,
          background: pal.surface, color: pal.ink, fontSize: 14, outline: "none"
        }}>
          <option value="all">Todas sociedades</option>
          {sociedades.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filterTipo} onChange={(e) => setFilterTipo(e.target.value)} style={{
          padding: "12px 14px", borderRadius: 10, border: `1px solid ${pal.line}`,
          background: pal.surface, color: pal.ink, fontSize: 14, outline: "none"
        }}>
          <option value="all">Entradas y salidas</option>
          <option value="entrada">Solo entradas</option>
          <option value="salida">Solo salidas</option>
        </select>
        <Input pal={pal} type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} style={{ width: 150 }} />
        <Input pal={pal} type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} style={{ width: 150 }} />
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          <Btn pal={pal} variant="secondary" size="sm" onClick={() => exportXLSX(exportRows, `fichajes_${dateFrom}_${dateTo}.xlsx`)}>↓ Excel</Btn>
          <Btn pal={pal} variant="secondary" size="sm" onClick={() => exportPDF(
            "Control de Fichajes — Nascor",
            [{ header: "Fecha", key: "Fecha" }, { header: "Hora", key: "Hora" }, { header: "Tipo", key: "Tipo" }, { header: "Nombre", key: "Nombre" }, { header: "DNI", key: "DNI" }, { header: "Sociedad", key: "Sociedad" }],
            exportRows, `fichajes_${dateFrom}_${dateTo}.pdf`

        </div>
      </div>

      <Card pal={pal} pad={0} style={{ overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }} className="scroll-thin">
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: pal.surfaceAlt, textAlign: "left" }}>
                {["Fecha", "Hora", "Tipo", "Empleado", "DNI", "Sociedad", "Real", "Geo", ""].map((h) =>

                )}
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 &&
              <tr><td colSpan={9} style={{ padding: 32, textAlign: "center", color: pal.inkMute }}>Sin resultados</td></tr>
              }
              {rows.slice(0, 200).map((f) => {
                const diff = Math.abs(toSec(f.horaDeclarada) - toSec(f.horaReal));
                const flagged = diff > 120;
                return (
                  <tr key={f.id} style={{ borderBottom: `1px solid ${pal.line}` }}>
                    <td className="mono" style={{ padding: "10px 14px" }}>{fmtDate(f.fecha)}</td>
                    <td className="mono tnum" style={{ padding: "10px 14px", fontWeight: 700 }}>{fmtTime(f.horaDeclarada)}</td>
                    <td style={{ padding: "10px 14px" }}>
                      <Chip pal={pal} tone={f.tipo === "entrada" ? "success" : "danger"}>
                        {f.tipo === "entrada" ? "↓" : "↑"} {f.tipo}
                      </Chip>
                    </td>
                    <td style={{ padding: "10px 14px" }}>{f.nombre}</td>
                    <td className="mono" style={{ padding: "10px 14px", color: pal.inkSoft }}>{f.dni}</td>
                    <td style={{ padding: "10px 14px", color: pal.inkSoft }}>{f.sociedad}</td>
                    <td className="mono" style={{ padding: "10px 14px", color: flagged ? pal.danger : pal.inkMute }}>
                      {fmtTime(f.horaReal)}{flagged && " ⚠"}
                    </td>
                    <td style={{ padding: "10px 14px", color: pal.inkMute, fontSize: 11 }}>
                      {f.lat ? <span title={`${f.lat.toFixed(5)}, ${f.lng.toFixed(5)}`}>📍</span> : "—"}
                    </td>
                    <td style={{ padding: "10px 14px" }}>
                      {isAdmin &&
                      <button onClick={() => del(f.id)} style={{
                        background: "transparent", border: "none", color: pal.danger,
                        cursor: "pointer", fontSize: 12, fontWeight: 600, padding: 0
                      }}>Eliminar</button>
                      }
                    </td>
                  </tr>);

              })}
            </tbody>
          </table>
          {rows.length > 200 &&
          <div style={{ padding: 12, textAlign: "center", color: pal.inkMute, fontSize: 12, borderTop: `1px solid ${pal.line}` }}>
              Mostrando primeros 200 de {rows.length}. Exporta para ver todos.
            </div>
          }
        </div>
      </Card>
    </div>);

};

/* ════ Employees tab ════ */
const EmployeesTab = ({ pal, employees, isAdmin, pass, reload, showToast, fichajes }) => {
  const [search, setSearch] = useState("");
  const [pendingId, setPendingId] = useState(null);
  const [sociedadFilter, setSociedadFilter] = useState("");
  const [estadoFilter, setEstadoFilter] = useState("activos"); // activos | inactivos | todos
  const [pageSize, setPageSize] = useState(50);

  const sociedades = useMemo(() => {
    const set = new Set();
    for (const e of employees) if (e.sociedad) set.add(e.sociedad);
    return Array.from(set).sort();
  }, [employees]);

  const filtered = useMemo(() => employees.filter((e) => {
    if (search) {
      const s = search.toLowerCase();
      if (!(e.nombre?.toLowerCase().includes(s) || String(e.dni||"").includes(search.toUpperCase()))) return false;
    }
    if (sociedadFilter && e.sociedad !== sociedadFilter) return false;
    const isActive = e.activo === "Sí" || e.activo === "Si";
    if (estadoFilter === "activos" && !isActive) return false;
    if (estadoFilter === "inactivos" && isActive) return false;
    return true;
  }), [employees, search, sociedadFilter, estadoFilter]);

  const visible = filtered.slice(0, pageSize);

  const fichCountByDni = useMemo(() => {
    const m = new Map();
    for (const f of fichajes) m.set(f.dni, (m.get(f.dni) || 0) + 1);
    return m;
  }, [fichajes]);

  // Última sincronización simulada (en real lo lee del Sheet o metadata)
  const lastSyncMs = useMemo(() => {
    const h = 0.4 + Math.random() * 1.3; // entre ~25min y ~1h40 atrás
    return Date.now() - h * 3600 * 1000;
  }, []);
  const lastSyncAgo = useMemo(() => {
    const m = Math.floor((Date.now() - lastSyncMs) / 60000);
    if (m < 60) return `hace ${m} min`;
    const h = Math.floor(m / 60),rem = m % 60;
    return `hace ${h}h ${rem}min`;
  }, [lastSyncMs]);

  const toggleActive = async (emp) => {
    if (!isAdmin) return;
    const isActive = emp.activo === "Sí" || emp.activo === "Si";
    setPendingId(emp.id);
    try {
      const r = await api.setEmpleadoActivo(pass, emp.id, !isActive);
      if (r.success) {
        showToast("success", `${emp.nombre.split(",")[0]} — ${!isActive ? "activado" : "desactivado"}`);
        reload();
      } else {
        showToast("error", r.error || "Error");
      }
    } catch (e) {showToast("error", String(e?.message || e));}
    setPendingId(null);
  };

  return (
    <div>
      {/* Sync status banner */}
      <Card pal={pal} pad={16} style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap", borderLeft: `3px solid ${pal.success}` }}>
        <div style={{
          width: 40, height: 40, borderRadius: 10, background: pal.successBg,
          color: pal.success, display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 20, flexShrink: 0
        }}>⟳</div>
        <div style={{ flex: 1, minWidth: 200 }}>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Sincronización automática activa</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div className="mono" style={{ fontSize: 11, color: pal.inkMute, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Última sync</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: pal.success }}>{lastSyncAgo}</div>
        </div>
      </Card>

      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <Input pal={pal} value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar empleado…" style={{ maxWidth: 260 }} />
        <select value={sociedadFilter} onChange={(e) => setSociedadFilter(e.target.value)}
          style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${pal.line}`, background: pal.surface, color: pal.ink, fontFamily: "inherit", fontSize: 14, minWidth: 160 }}>
          <option value="">Todas las sociedades</option>
          {sociedades.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <div style={{ display: "flex", borderRadius: 10, overflow: "hidden", border: `1px solid ${pal.line}` }}>
          {[{k:"activos",l:"Activos"},{k:"inactivos",l:"Inactivos"},{k:"todos",l:"Todos"}].map(opt => (
            <button key={opt.k} onClick={() => setEstadoFilter(opt.k)}
              style={{
                padding: "10px 14px", fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                border: "none", cursor: "pointer",
                background: estadoFilter === opt.k ? pal.accent : pal.surface,
                color: estadoFilter === opt.k ? "#fff" : pal.inkSoft,
              }}>{opt.l}</button>
          ))}
        </div>
        <div style={{ marginLeft: "auto", fontSize: 12, color: pal.inkMute }}>
          Mostrando {visible.length} de {filtered.length} ({employees.length} total)
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 12 }}>
        {visible.map((e) => {
          const effectiveActive = e.activo === "Sí" || e.activo === "Si";
          const isPending = pendingId === e.id;
          return (
            <Card pal={pal} key={e.id} pad={16} style={{ opacity: effectiveActive ? 1 : 0.6 }}>
              <div style={{ display: "flex", alignItems: "start", justifyContent: "space-between", gap: 10 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis" }}>{e.nombre}</div>
                  <div className="mono" style={{ fontSize: 11, color: pal.inkMute }}>{e.dni}</div>
                  <div style={{ fontSize: 12, color: pal.inkSoft, marginTop: 6 }}>{e.sociedad}</div>
                </div>
                <Chip pal={pal} tone={effectiveActive ? "success" : "neutral"}>
                  {effectiveActive ? "Activo" : "Inactivo"}
                </Chip>
              </div>
              <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${pal.line}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 11, color: pal.inkMute }}>
                  <span className="mono" style={{ fontWeight: 700, color: pal.ink }}>{fichCountByDni.get(e.dni) || 0}</span> fichajes en rango
                </div>
                {isAdmin &&
                <button onClick={() => toggleActive(e)} style={{
                  background: "transparent", border: `1px solid ${pal.line}`,
                  color: effectiveActive ? pal.danger : pal.success,
                  cursor: "pointer", fontSize: 11, fontWeight: 700, padding: "4px 10px",
                  borderRadius: 6, textTransform: "uppercase", letterSpacing: 0.5
                }}>{effectiveActive ? "Desactivar" : "Activar"}</button>
                }
              </div>
            </Card>);

        })}
      </div>

      {visible.length < filtered.length && (
        <div style={{ marginTop: 16, textAlign: "center" }}>
          <Btn pal={pal} variant="secondary" onClick={() => setPageSize(n => n + 50)}>
            Mostrar más ({filtered.length - visible.length} restantes)
          </Btn>
        </div>
      )}

      <div style={{ marginTop: 20, padding: 14, background: pal.surfaceAlt, borderRadius: 10, fontSize: 12, color: pal.inkSoft, lineHeight: 1.6 }}>
        <strong style={{ color: pal.ink }}>ℹ Gestión del listado:</strong> los empleados se sincronizan automáticamente desde SAP. No se permite alta/edición manual para evitar conflictos con la próxima sincronización.
      </div>
    </div>);

};

/* ═══════════════════════════════════════════════════════════════
   TWEAKS PANEL
═══════════════════════════════════════════════════════════════ */
const TweaksPanel = ({ pal, tweaks, setTweaks, visible }) => {
  if (!visible) return null;
  const accents = ["#F26A21", "#D97757", "#1F7A4D", "#2D5BB8", "#8B3FA9", "#1A1A1D"];
  return (
    <div style={{
      position: "fixed", bottom: 20, right: 20, width: 280, zIndex: 8000,
      background: pal.surface, border: `1px solid ${pal.lineStrong}`,
      borderRadius: 14, padding: 18, boxShadow: "0 20px 50px rgba(0,0,0,0.2)",
      fontFamily: "Inter, sans-serif", color: pal.ink
    }}>
      <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: pal.inkMute, marginBottom: 14 }}>Tweaks</div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Variante visual</div>
        <div style={{ display: "flex", gap: 4 }}>
          {["A", "B", "C"].map((v) =>
          <button key={v} onClick={() => setTweaks({ ...tweaks, variant: v })} style={{
            flex: 1, padding: "6px 8px", borderRadius: 8,
            border: `1px solid ${tweaks.variant === v ? pal.accent : pal.line}`,
            background: tweaks.variant === v ? pal.accentSoft : "transparent",
            color: tweaks.variant === v ? pal.accent : pal.ink,
            cursor: "pointer", fontWeight: 600, fontSize: 12
          }}>{v === "A" ? "Cálido" : v === "B" ? "Neutro" : "Industrial"}</button>
          )}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Color acento</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {accents.map((c) =>
          <button key={c} onClick={() => setTweaks({ ...tweaks, accent: c })} style={{
            width: 28, height: 28, borderRadius: 8, background: c, cursor: "pointer",
            border: tweaks.accent === c ? `2px solid ${pal.ink}` : `1px solid ${pal.line}`,
            outline: tweaks.accent === c ? `2px solid ${pal.bg}` : "none"
          }} />
          )}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13 }}>
          <input type="checkbox" checked={tweaks.dark} onChange={(e) => setTweaks({ ...tweaks, dark: e.target.checked })} />
          Modo oscuro
        </label>
      </div>

      <div>
        <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6 }}>Estilo botón fichar</div>
        <div style={{ display: "flex", gap: 4 }}>
          {[["pulse", "Pulso"], ["flat", "Plano"]].map(([v, l]) =>
          <button key={v} onClick={() => setTweaks({ ...tweaks, buttonStyle: v })} style={{
            flex: 1, padding: "6px 8px", borderRadius: 8,
            border: `1px solid ${tweaks.buttonStyle === v ? pal.accent : pal.line}`,
            background: tweaks.buttonStyle === v ? pal.accentSoft : "transparent",
            color: tweaks.buttonStyle === v ? pal.accent : pal.ink,
            cursor: "pointer", fontWeight: 600, fontSize: 12
          }}>{l}</button>
          )}
        </div>
      </div>
    </div>);

};

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
const App = () => {
  const [session, setSession] = useState(null);
  const [toast, setToast] = useState(null);
  const [tweaks, setTweaksState] = useState(() => readTweaks());
  const [tweakVisible, setTweakVisible] = useState(false);

  const pal = useMemo(() => {
    const sess = session;
    const tenant = sess?.employee ? getTenant(sess.employee.sociedad) : TENANTS.nascor;
    // Si hay sesión de empleado: el acento viene del tenant (naranja Nascor / azul Grado).
    // Si no (login, admin, auditor): se respeta el tweak accent para poder probar variantes.
    const tenantAccent = tweaks.dark ? tenant.accentDark : tenant.accent;
    const variantAccents = { A: tweaks.accent, B: "#2D5BB8", C: "#1A1A1D" };
    const tweakAccent = tweaks.variant === "A" ? tweaks.accent : variantAccents[tweaks.variant] || tweaks.accent;
    const effectiveAccent = sess?.role === "employee" ? tenantAccent : tweakAccent;
    return makePalette(tweaks.dark, effectiveAccent, tenant);
  }, [tweaks, session]);

  const setTweaks = (t) => {
    setTweaksState(t);
    localStorage.setItem("fichajes_tweaks", JSON.stringify(t));
    try {window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: t }, "*");} catch {}
  };

  const showToast = (type, msg) => {
    setToast({ type, msg });
    setTimeout(() => setToast(null), 3000);
  };

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweakVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweakVisible(false);
    };
    window.addEventListener("message", onMsg);
    try {window.parent?.postMessage({ type: "__edit_mode_available" }, "*");} catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  useEffect(() => {
    document.body.style.background = pal.bg;
  }, [pal.bg]);

  const logout = () => setSession(null);

  return (
    <>
      {!session && <LoginScreen pal={pal} onLogin={setSession} tweaks={tweaks} setTweaks={setTweaks} />}
      {session?.role === "employee" && <EmployeeScreen pal={pal} employee={session.employee} onLogout={logout} tweaks={tweaks} setTweaks={setTweaks} showToast={showToast} />}
      {(session?.role === "admin" || session?.role === "auditor") &&
      <AdminAuditorScreen pal={pal} role={session.role} pass={session.pass} onLogout={logout} tweaks={tweaks} setTweaks={setTweaks} showToast={showToast} />
      }
      <Toast toast={toast} />
      <TweaksPanel pal={pal} tweaks={tweaks} setTweaks={setTweaks} visible={tweakVisible} />
    </>);

};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
